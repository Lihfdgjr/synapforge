name: test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  pytest:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install (CPU torch + dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.0"
          python -m pip install -e ".[dev]"

      - name: Lint
        continue-on-error: true
        run: |
          ruff check synapforge tests examples

      - name: Test
        env:
          PYTHONHASHSEED: "0"
        run: |
          pytest tests/ -v -ra --cov=synapforge --cov-report=xml --cov-report=term

      - name: Upload coverage (Linux py3.11 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
